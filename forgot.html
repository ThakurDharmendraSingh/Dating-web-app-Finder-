<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finder - Reset Password</title>
  <link rel="stylesheet" href="./forgot.css">
</head>
<body>

  <div class="container">

    <div class="logo">
       <span>❤️Finder</span>
    </div>

    <div class="card">
      <h2>Reset Password</h2>

      <div class="input-box">
        <input type="text" id="email" placeholder="Enter your Email or Phone">
      </div>

      <button class="btn" onclick="resetPassword()">Send Reset Link</button>

      <p class="login-text">
        <a href="index.html">Back to Login</a>
      </p>
    </div>

  </div>

  <script src="./forgot.js"></script>
</body>
</html>
